<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE IDE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button id="btn-html">HTML</button>
        <button id="btn-css">CSS</button>
        <button id="btn-js">JS</button>
        <button id="btn-run" style="background: #238636; color: white; font-weight: bold;">RUN</button>
    </nav>

    <div class="editor-container">
        <textarea id="html-code" class="tab-content" placeholder="HTML Code here..."></textarea>
        <textarea id="css-code" class="tab-content" placeholder="CSS Code here..." style="display:none;"></textarea>
        <textarea id="js-code" class="tab-content" placeholder="JS Code here..." style="display:none;"></textarea>
    </div>

    <script src="script.js"></script>
</body>
</html>
